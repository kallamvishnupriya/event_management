{% extends 'base.html' %}
{% block title %}Login – EventHub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h3 class="mb-1 fw-bold text-center">Welcome Back</h3>
        <p class="text-muted text-center mb-4">Login to your EventHub account</p>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <hr/>
        <p class="text-center mb-1" style="font-size:.9rem;">
          New here? <a href="{% url 'register' %}">Register as Attendee</a>
        </p>
        <p class="text-center" style="font-size:.9rem;">
          Are you an organizer? <a href="{% url 'register_organizer' %}">Register as Organizer</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
