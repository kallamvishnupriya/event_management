{% extends 'base.html' %}
{% block title %}Register as Organizer – EventHub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="mb-1 fw-bold text-center">Organizer Registration</h3>
        <p class="text-muted text-center mb-4">Create and manage events on EventHub</p>
        <form method="POST">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" required/>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control"/>
            </div>
            <div class="col-12">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" required/>
            </div>
            <div class="col-12">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required/>
            </div>
            <div class="col-12">
              <label class="form-label">Organization Name</label>
              <input type="text" name="organization" class="form-control" placeholder="Your company or organization"/>
            </div>
            <div class="col-12">
              <label class="form-label">Phone Number</label>
              <input type="text" name="phone" class="form-control" placeholder="+91 XXXXXXXXXX"/>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required/>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="password2" class="form-control" required/>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100">Register as Organizer</button>
            </div>
          </div>
        </form>
        <hr/>
        <p class="text-center" style="font-size:.9rem;">
          Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
