{% extends 'base.html' %}
{% block title %}Cancel Booking – EventHub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 text-center">
        <div style="font-size:3rem;">⚠️</div>
        <h4 class="fw-bold mt-3">Cancel Booking?</h4>
        <p class="text-muted">Are you sure you want to cancel your booking for <strong>{{ booking.event.title }}</strong>?</p>
        <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">Yes, Cancel</button>
          <a href="{% url 'attendee_dashboard' %}" class="btn btn-outline-secondary px-4">Go Back</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
